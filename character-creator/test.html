<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Three.js</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    #wrap { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
    canvas { display: block; width: 100%; height: 100%; }
    #info { position: fixed; top: 10px; left: 10px; color: #fff; font: 14px monospace; z-index: 10; }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="c"></canvas></div>
  <div id="info">Loading...</div>
  <script>
    const canvas = document.getElementById('c');
    const info = document.getElementById('info');

    try {
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x080c16);

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(40, 1, 1, 500);
      camera.position.set(0, 30, 60);
      camera.lookAt(0, 15, 0);

      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(10, 30, 20);
      scene.add(light);
      scene.add(new THREE.AmbientLight(0x444444));

      const geo = new THREE.BoxGeometry(10, 20, 10);
      const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
      const box = new THREE.Mesh(geo, mat);
      box.position.y = 10;
      scene.add(box);

      const sphere = new THREE.Mesh(new THREE.SphereGeometry(8, 16, 12), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
      sphere.position.set(20, 15, 0);
      scene.add(sphere);

      function resize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      window.addEventListener('resize', resize);
      resize();

      info.textContent = 'Renderer: ' + renderer.getContext().constructor.name + ' | Canvas: ' + canvas.width + 'x' + canvas.height;

      function loop() {
        requestAnimationFrame(loop);
        box.rotation.y += 0.01;
        renderer.render(scene, camera);
      }
      loop();
    } catch (e) {
      info.textContent = 'ERROR: ' + e.message;
    }
  </script>
</body>
</html>
