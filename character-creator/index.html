<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Rangers — Criador de Personagens</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="cc-header">
      <a href="../index.html" class="cc-back">← Voltar ao Jogo</a>
      <h1>CRIADOR DE RANGERS</h1>
      <div class="cc-header-actions">
        <button class="cc-btn secondary" id="btn-gallery">📁 Galeria</button>
        <button class="cc-btn primary" id="btn-export">📤 Exportar</button>
      </div>
    </header>

    <div class="cc-layout">
      <!-- Painel Esquerdo — Partes -->
      <aside class="cc-panel cc-panel-left">
        <div class="cc-panel-title">PARTES</div>

        <div class="cc-section">
          <div class="cc-section-title">Capacete</div>
          <div class="cc-options" id="opt-helmet"></div>
        </div>

        <div class="cc-section">
          <div class="cc-section-title">Peitoral</div>
          <div class="cc-options" id="opt-chest"></div>
        </div>

        <div class="cc-section">
          <div class="cc-section-title">Arma</div>
          <div class="cc-options" id="opt-weapon"></div>
        </div>

        <div class="cc-section">
          <div class="cc-section-title">Sapatos</div>
          <div class="cc-options" id="opt-boots"></div>
        </div>

        <div class="cc-section">
          <div class="cc-section-title">Acessórios</div>
          <div class="cc-options" id="opt-accessory"></div>
        </div>
      </aside>

      <!-- Canvas 3D -->
      <main class="cc-viewport">
        <canvas id="cc-canvas"></canvas>
        <div class="cc-platform-label" id="cc-name-label">RANGER SEM NOME</div>
        <div class="cc-rotation-hint">🖱️ Arrasta para rodar · Scroll para zoom</div>
      </main>

      <!-- Painel Direito — Cores + Info -->
      <aside class="cc-panel cc-panel-right">
        <div class="cc-panel-title">PERSONALIZAR</div>

        <div class="cc-section">
          <div class="cc-section-title">Nome</div>
          <input type="text" id="cc-name" class="cc-input" value="Ranger Sem Nome" maxlength="20">
        </div>

        <div class="cc-section">
          <div class="cc-section-title">Classe</div>
          <div class="cc-class-selector">
            <button class="cc-class-btn active" data-class="warrior">⚔️ Guerreiro</button>
            <button class="cc-class-btn" data-class="ranger">🔫 Ranger</button>
            <button class="cc-class-btn" data-class="mage">⚡ Mago</button>
            <button class="cc-class-btn" data-class="tank">🛡️ Tanque</button>
          </div>
        </div>

        <div class="cc-section">
          <div class="cc-section-title">Cores</div>
          <div class="cc-color-row">
            <label>Primária</label>
            <input type="color" id="cc-color-primary" value="#2244cc">
          </div>
          <div class="cc-color-row">
            <label>Secundária</label>
            <input type="color" id="cc-color-secondary" value="#cc2222">
          </div>
          <div class="cc-color-row">
            <label>Accent</label>
            <input type="color" id="cc-color-accent" value="#ffcc00">
          </div>
          <div class="cc-color-row">
            <label>Visor</label>
            <input type="color" id="cc-color-visor" value="#22ccff">
          </div>
          <div class="cc-color-row">
            <label>Escuro</label>
            <input type="color" id="cc-color-dark" value="#111122">
          </div>
        </div>

        <div class="cc-section">
          <div class="cc-section-title">Estatísticas</div>
          <div class="cc-stat-row">
            <span>❤️ HP</span>
            <input type="range" id="cc-hp" min="60" max="150" value="100">
            <span class="cc-stat-val" id="cc-hp-val">100</span>
          </div>
          <div class="cc-stat-row">
            <span>💥 ATK</span>
            <input type="range" id="cc-atk" min="5" max="25" value="12">
            <span class="cc-stat-val" id="cc-atk-val">12</span>
          </div>
          <div class="cc-stat-row">
            <span>🏃 SPD</span>
            <input type="range" id="cc-spd" min="3" max="8" value="5">
            <span class="cc-stat-val" id="cc-spd-val">5</span>
          </div>
          <div class="cc-stat-row">
            <span>🛡️ DEF</span>
            <input type="range" id="cc-def" min="2" max="15" value="6">
            <span class="cc-stat-val" id="cc-def-val">6</span>
          </div>
        </div>

        <div class="cc-section">
          <div class="cc-section-title">Ações</div>
          <button class="cc-btn full green" id="btn-save">💾 Salvar Ranger</button>
          <button class="cc-btn full" id="btn-export-json">📤 Exportar JSON</button>
        </div>
      </aside>
    </div>

    <!-- Gallery Modal -->
    <div class="cc-modal-overlay" id="gallery-modal" style="display:none;">
      <div class="cc-modal">
        <div class="cc-modal-header">
          <h2>GALERIA DE RANGERS</h2>
          <button class="cc-modal-close" id="gallery-close">✕</button>
        </div>
        <div class="cc-modal-body" id="gallery-grid"></div>
      </div>
    </div>
  </div>

  <script src="parts.js"></script>
  <script src="creator.js"></script>
</body>
</html>
